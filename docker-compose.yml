services:
  backend:
    build: ./backend
    container_name: cubmaster-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////data/cubmaster.db}
      - SECRET_KEY=${SECRET_KEY}
      - ICAL_URL=${ICAL_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - PACK_NUMBER=${PACK_NUMBER:-44}
      - PACK_LOCATION=${PACK_LOCATION:-Philipsburg, PA}
    volumes:
      - cubmaster-data:/data
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: cubmaster-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3030:80"
    depends_on:
      - backend

volumes:
  cubmaster-data:
